feeder: dataset.dataloader_video.BaseFeeder
phase: train
dataset: sign2mint-space-core #MOD
# dataset: phoenix14-si5
num_epoch: 500
work_dir: ./work_dir/sign2mint-space-core/ #MOD
batch_size: 2
random_seed: 0
test_batch_size: 8
num_worker: 2
device: 0,1
log_interval: 50
eval_interval: 1
save_interval: 2
# python in default
# evaluate_tool: sclite
evaluate_tool: python
loss_weights:
  SeqCTC: 1.0
  # VAC
  ConvCTC: 1.0
  Dist: 10.0
# load_weights: './work_dir/sign2mint-space-coredev_100.00_epoch50_model.pt' #MOD
load_checkpoints: './work_dir/dev_66.37_epoch138_model.pt' #MOD

optimizer_args:
  optimizer: Adam
  base_lr: 0.0001
  step: [ 20, 35]
  learning_ratio: 1
  weight_decay: 0.0001
  start_epoch: 139  # MOD
  nesterov: False

feeder_args:
  mode: 'train'
  datatype: 'video'
  num_gloss: -1
  drop_ratio: 1.0

model: slr_network.SLRModel
decode_mode: beam
model_args:
  num_classes: 1296
  c2d_type: resnet18
  conv_type: 2
  use_bn: 1
  # SMKD
  share_classifier: True
  weight_norm: True
